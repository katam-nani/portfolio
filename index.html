<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katam Nani | ECE Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated particle background -->
    <canvas id="particles-canvas"></canvas>

    <!-- Story stage -->
    <div class="stage" id="stage">

        <!-- Top bar: name + chapter dots -->
        <div class="top-bar">
            <div class="portfolio-title">Katam Nani &nbsp;<span class="title-tag">ECE Portfolio</span></div>
            <div class="chapter-dots" id="chapter-dots"></div>
        </div>

        <!-- Info card (right side) -->
        <div class="info-card" id="info-card">
            <div class="info-card-title" id="info-card-title"></div>
            <div class="info-card-body" id="info-card-body"></div>
        </div>

        <!-- Speech bubble (above character) -->
        <div class="speech-bubble" id="speech-bubble">
            <span id="speech-text"></span>
            <div class="bubble-tail"></div>
        </div>

        <!-- Animated character container -->
        <div class="character-wrapper" id="character-wrapper">
            <!-- SVG character injected by JS -->
        </div>

        <!-- Ground / stage floor -->
        <div class="stage-floor"></div>

        <!-- Navigation controls -->
        <div class="story-controls">
            <button class="ctrl-btn" id="prev-btn" title="Previous">&#9664;</button>
            <button class="ctrl-btn play-pause" id="play-btn" title="Play / Pause">&#9646;&#9646;</button>
            <button class="ctrl-btn" id="next-btn" title="Next">&#9654;</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
